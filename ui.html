<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Sniffer Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eeffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1920px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .status {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card h3 {
            color: #00ff88;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00d4ff;
        }

        .stat-label {
            color: #8899aa;
            font-size: 14px;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #8899aa;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 255, 136, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757 0%, #ff3344 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 71, 87, 0.4);
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .filter-btn {
            padding: 8px 16px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            cursor: pointer;
            color: #00ff88;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(0, 255, 136, 0.4);
            font-weight: bold;
        }

        .packet-list {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .packet-item {
            display: grid;
            grid-template-columns: 100px 300px 150px 120px 1fr 150px;
            gap: 10px;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            border-left: 3px solid;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .packet-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .packet-item.tcp {
            border-left-color: #00d4ff;
        }

        .packet-item.udp {
            border-left-color: #ffaa00;
        }

        .packet-item.http {
            border-left-color: #ff4757;
        }

        .packet-item.icmp {
            border-left-color: #8899aa;
        }

        .packet-item:first-child {
            font-weight: bold;
            font-size: 14px;
        }

        .packet-header {
            color: #8899aa;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4);
            transition: all 0.3s ease;
            color: #000;
            border: 3px solid rgba(0, 0, 0, 0.2);
        }

        .refresh-btn:hover {
            transform: scale(1.1) rotate(15deg);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #8899aa;
            font-size: 24px;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #ff4757;
        }

        pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            color: #00d4ff;
            margin-top: 15px;
        }

        .scroll-progress {
            height: 3px;
            background: linear-gradient(90deg, #00ff88 25%, #00d4ff 50%, #ffaa00 75%);
            border-radius: 2px;
            margin-bottom: 15px;
        }

        .scroll-progress-inner {
            height: 100%;
            background: #00ff88;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            text-align: center;
        }

        @media (max-width: 768px) {
            .packet-item {
                grid-template-columns: 60px 200px 1fr;
            }
            
            .header-col, .direction-col, .size-col, .protocol-col {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                📡 NETWORK SNIFFER 
                <span style="font-size: 14px; color: #8899aa; margin-left: 15px; font-weight: normal;">Live Traffic Analysis</span>
            </div>
            <div class="status">
                <div class="status-indicator">
                    <div class="pulse-dot" id="connection-dot"></div>
                    <span id="connection-status">Connected</span>
                </div>
                <div class="status-indicator" style="background: rgba(255, 71, 87, 0.1); border-color: rgba(255, 71, 87, 0.3);">
                    <div style="width: 10px; height: 10px; background: #ff4757; border-radius: 50%;" class="pulse-dot" style="animation: pulse 0.5s infinite;"></div>
                    <span style="color: #ff6b7a;">Interface: eth0</span>
                </div>
            </div>
        </header>

        <div class="control-panel">
            <div class="control-group">
                <label class="control-label">Capture Filter</label>
                <input type="text" id="capture-filter" placeholder="e.g., port 80 or ip host 192.168.1.1" 
                       style="width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: #fff; margin-bottom: 10px;">
            </div>
            <div class="control-group">
                <label class="control-label">Protocol Filter</label>
                <div class="filter-group" id="protocol-filters">
                    <button class="filter-btn active" data-protocol="all">All</button>
                    <button class="filter-btn" data-protocol="tcp">TCP</button>
                    <button class="filter-btn" data-protocol="udp">UDP</button>
                    <button class="filter-btn" data-protocol="http">HTTP</button>
                    <button class="filter-btn" data-protocol="icmp">ICMP</button>
                </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn btn-primary" onclick="toggleCapture()">Start Capture</button>
                <button class="btn btn-danger" onclick="toggleCapture(false)">Stop Capture</button>
                <button class="btn btn-primary" style="background: linear-gradient(135deg, #ffaa00 0%, #ff8800 100%);" onclick="clearPackets()">Clear All</button>
            </div>
        </div>

        <div class="stats-container">
            <div class="card stat-box">
                <div class="stat-value" id="packet-count">0</div>
                <div class="stat-label">Packets Captured</div>
            </div>
            <div class="card stat-box">
                <div class="stat-value" id="bandwidth">0</div>
                <div class="stat-label">Mbps</div>
            </div>
            <div class="card stat-box">
                <div class="stat-value" id="unique-hosts">0</div>
                <div class="stat-label">Unique Hosts</div>
            </div>
            <div class="card stat-box">
                <div class="stat-value" id="error-count">0</div>
                <div class="stat-label">Errors</div>
            </div>
        </div>

        <div class="stats-container" style="margin-top: 20px;">
            <div class="card stat-box">
                <div class="stat-value" id="tcp-count">0</div>
                <div class="stat-label">TCP Packets</div>
            </div>
            <div class="card stat-box">
                <div class="stat-value" id="udp-count">0</div>
                <div class="stat-label">UDP Packets</div>
            </div>
            <div class="card stat-box">
                <div class="stat-value" id="http-count">0</div>
                <div class="stat-label">HTTP Packets</div>
            </div>
            <div class="card stat-box">
                <div class="stat-value" id="icmp-count">0</div>
                <div class="stat-label">ICMP Packets</div>
            </div>
        </div>

        <div class="control-panel">
            <div class="packet-header">Live Packet Capture
                <span id="total-size">0 MB</span>
            </div>
            <div class="scroll-progress">
                <div class="scroll-progress-inner" id="scroll-progress" style="width: 100%;"></div>
            </div>
            <div class="packet-list" id="packet-list">
                <!-- Packets will be added here dynamically -->
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshPackets()">↻</button>

    <div class="modal" id="packet-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Packet Details</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div id="modal-packet-detail"></div>
        </div>
    </div>

    <script>
        // Network Sniffer State
        let isCapturing = false;
        let packetId = 0;
        let packets = [];
        let lastUpdate = Date.now();
        let captureFilter = '';
        
        // Statistics
        let stats = {
            tcp: 0,
            udp: 0,
            http: 0,
            icmp: 0,
            errors: 0
        };
        
        const protocolFilters = {
            all: true,
            tcp: false,
            udp: false,
            http: false,
            icmp: false
        };

        // Simulated packet generation for demo
        function generatePackets() {
            const protocols = ['tcp', 'udp', 'tcp', 'tcp', 'http', 'http', 'icmp'];
            const protocol = protocols[Math.floor(Math.random() * protocols.length)];
            
            const packet = {
                id: ++packetId,
                timestamp: new Date().toISOString(),
                timestampRelative: new Date().toLocaleTimeString(),
                seq: Math.floor(Math.random() * 1000000),
                srcIp: `192.168.1.${Math.floor(Math.random() * 255)}`,
                dstIp: `10.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}`,
                srcPort: Math.floor(Math.random() * 65535),
                dstPort: [80, 443, 8080, 53, 22, 25, 110, 143][Math.floor(Math.random() * 8)],
                size: Math.floor(Math.random() * 1500) + 64,
                protocol: protocol,
                bytes: Math.max(0, Math.floor(Math.random() * 1000))
            };
            
            // Generate sample payload for display
            let payloadText = '';
            if (packet.protocol === 'tcp') {
                const httpPrefixes = ['GET / HTTP/1.1\\r\\n', 'POST /api/data HTTP/1.1\\r\\n', 'HTTP/1.1 200 OK\\r\\n', ''];
                payloadText = httpPrefixes[Math.floor(Math.random() * httpPrefixes.length)];
            } else if (packet.protocol === 'icmp') {
                payloadText = 'ECHO REQUEST' || 'ECHO REPLY';
            }
            
            // Store packet
            packets.push(packet);
            
            // Update display
            updatePacketDisplay(packet);
            
            // Update statistics
            updateStats(packet.size);
            
            // Rotate scroll progress
            rotateProgress();
            
            return packet;
        }

        function updatePacketDisplay(packet) {
            const list = document.getElementById('packet-list');
            const item = document.createElement('div');
            item.className = `packet-item ${packet.protocol}`;
            
            const timestamp = new Date(packet.timestamp).toLocaleTimeString();
            
            item.innerHTML = `
                <div>${packet.id}</div>
                <div class="timestamp">${timestamp}</div>
                <div class="seq-col">#${packet.seq}</div>
                <div class="size-col">${packet.size} <span class="protocol-col" id="proto-${packet.id}">${packet.protocol.toUpperCase()}</span></div>
                <div>${packet.srcIp}:${packet.srcPort} → <strong>${packet.dstIp}:${packet.dstPort}</strong> ${payloadText ? payloadText : ''}</div>
                <div style="text-align: right; color: #667788;" onclick="showPacket(${packet.id})">${packet.id + '▼'}</div>
            `;
            
            list.insertBefore(item, list.firstChild);
            
            // Remove old items if too many
            if (list.children.length > 100) {
                list.removeChild(list.lastChild);
            }
        }

        function updateStats(bytes) {
            // Calculate bandwidth
            const now = Date.now();
            const delta = (now - lastUpdate) / 1000 || 1;
            const mbps = (bytes / (1024 * 1024)) / delta || 0;
            document.getElementById('bandwidth').textContent = mbps.toFixed(2);
            lastUpdate = now;
            
            // Update totals
            document.getElementById('packet-count').textContent = packets.length;
            document.getElementById('total-size').textContent = (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function rotateProgress() {
            const width = 100 + Math.random() * 20;
            document.getElementById('scroll-progress').style.width = Math.min(width, 100) + '%';
        }

        function showPacket(id) {
            const packet = packets.find(p => p.id === id);
            if (!packet) return;
            
            const detail = document.getElementById('modal-packet-detail');
            detail.innerHTML = `
                <div class="packet-header">Packet #${packet.id}
                    <span>→ ${new Date(packet.timestamp).toLocaleString()}</span>
                </div>
                <div><strong>Sequence:</strong> #${packet.seq}</div>
                <div style="margin-top: 10px; color: #00d4ff;"><strong>Source:</strong> ${packet.srcIp}:${packet.srcPort}</div>
                <div style="color: #ffaa00;"><strong>Destination:</strong> ${packet.dstIp}:${packet.dstPort}</div>
                <div style="margin-top: 10px;"><strong>Length:</strong> ${packet.size} bytes</div>
                <div style="margin-top: 15px; color: #8899aa;"><strong>Protocol:</strong> ${packet.protocol.toUpperCase()}</div>
                <div style="background: rgba(0, 255, 136, 0.1); padding: 10px; border-radius: 6px; margin-top: 10px;">
                    <strong>Preview:</strong><br>
                    <pre>${packet.protocol.toUpperCase()} packet (payload preview)</pre>
                </div>
                <div style="margin-top: 15px; color: #667788;">
                    <strong>Note:</strong> This is a simulated network sniffer UI for prototyping purposes.
                </div>
            `;
            
            document.getElementById('packet-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('packet-modal').classList.remove('active');
        }

        function toggleCapture(stop = false) {
            if (stop) {
                isCapturing = false;
            } else {
                if (isCapturing) return;
                isCapturing = true;
            }
            
            const dot = document.getElementById('connection-dot');
            const status = document.getElementById('connection-status');
            
            if (isCapturing) {
                dot.style.background = '#00ff88';
                dot.style.animation = 'pulse 1s infinite';
                status.textContent = 'Capturing...';
                generatePackets();
                setInterval(generatePackets, 50);
            } else {
                dot.style.background = '#888';
                dot.style.animation = 'none';
                status.textContent = 'Stopped';
            }
        }

        function clearPackets() {
            packets = [];
            document.getElementById('packet-list').innerHTML = '';
            toggleCapture(true);
            updateStats(0);
            document.getElementById('bandwidth').textContent = '0';
        }

        function refreshPackets() {
            const list = document.getElementById('packet-list');
            packets.forEach(packet => updatePacketDisplay(packet));
            rotateProgress();
        }

        // Protocol filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const protocol = this.dataset.protocol;
                
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                protocolFilters[protocol] = true;
                
                // Clear if all selected
                if (protocol === 'all') {
                    Object.values(protocolFilters).forEach(v => v = true);
                    return;
                }
                
                // Re-filter displayed packets
                const newPackets = packets.filter(p => {
                    if (protocol === 'all') return true;
                    return p.protocol === protocol;
                });
                
                list.innerHTML = '';
                newPackets.forEach(packet => updatePacketDisplay(packet));
            });
        });

        // Capture filter input
        document.getElementById('capture-filter').addEventListener('input', (e) => {
            captureFilter = e.target.value;
            console.log('Capture filter:', captureFilter);
        });

        // Initial state
        console.log('Network Sniffer Dashboard initialized');
        console.log('Ready to start packet capture simulation');
    </script>
</body>
</html>
